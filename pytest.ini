[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning
markers =
    slow: тесты, требующие реальных LLM-вызовов
    integration: интеграционные тесты графа целиком